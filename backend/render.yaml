# Render Blueprint — Infrastructure as Code
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: bluefinance-api
    env: docker
    repo: https://github.com/your-org/BlueFinance.git
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: PORT
        value: "8080"
      # Production frontend URL — thay bằng domain thật của frontend sau
      - key: AllowedOrigins
        value: https://your-frontend-domain.com
      # Optional: override SQLite path to use persistent disk
      # - key: ConnectionStrings__DefaultConnection
      #   value: Data Source=/app/data/bluefinance.db
    healthCheckPath: /api/wallets
    autoDeploy: true
